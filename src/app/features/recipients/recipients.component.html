<div class="page-header">
  <div>
    <h2>Notification recipients</h2>
    <p>Manage who receives HIGH urgency alerts and weekly intelligence reports</p>
  </div>
  <p-button label="Add recipient" icon="pi pi-plus" (onClick)="openDialog()" />
</div>

<p-card>
  <p-table [value]="recipients()" [loading]="loading()" [rowHover]="true">
    <ng-template pTemplate="header">
      <tr>
        <th>Email</th>
        <th>Name</th>
        <th>Alerts</th>
        <th>Weekly report</th>
        <th>Active</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-recipient>
      <tr>
        <td>{{ recipient.email }}</td>
        <td>{{ recipient.name ?? '—' }}</td>
        <td>
          <p-toggleswitch
            [ngModel]="recipient.alertEnabled"
            [disabled]="isUpdating(recipient.id) || !recipient.active"
            (ngModelChange)="updateToggle(recipient, 'alertEnabled', $event)"
          />
        </td>
        <td>
          <p-toggleswitch
            [ngModel]="recipient.weeklyReportEnabled"
            [disabled]="isUpdating(recipient.id) || !recipient.active"
            (ngModelChange)="updateToggle(recipient, 'weeklyReportEnabled', $event)"
          />
        </td>
        <td>
          <p-toggleswitch
            [ngModel]="recipient.active"
            [disabled]="isUpdating(recipient.id)"
            (ngModelChange)="updateToggle(recipient, 'active', $event)"
          />
        </td>
        <td>
          <p-button
            icon="pi pi-trash"
            severity="danger"
            [rounded]="true"
            [text]="true"
            (onClick)="confirmDelete(recipient)"
          />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6">
          No recipients configured yet. Add team members who should receive alert emails.
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<p-dialog
  header="Add recipient"
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  [modal]="true"
  [style]="{ width: '28rem' }"
  (onHide)="closeDialog()"
>
  <form [formGroup]="form" (ngSubmit)="saveRecipient()" class="dialog-form">
    <div class="field">
      <label for="email">Email *</label>
      <input pInputText id="email" formControlName="email" class="w-full" placeholder="team@company.com" />
    </div>

    <div class="field">
      <label for="name">Name</label>
      <input pInputText id="name" formControlName="name" class="w-full" placeholder="Optional display name" />
    </div>

    <div class="toggle-field">
      <label>Instant alerts (HIGH urgency)</label>
      <p-toggleswitch formControlName="alertEnabled" />
    </div>

    <div class="toggle-field">
      <label>Weekly report</label>
      <p-toggleswitch formControlName="weeklyReportEnabled" />
    </div>

    <div class="dialog-actions">
      <p-button type="submit" label="Add recipient" [loading]="saving()" />
      <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="closeDialog()" />
    </div>
  </form>
</p-dialog>

<p-confirmDialog />
<p-toast />
